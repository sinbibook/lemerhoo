<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <meta name="description" content="양양 동호해변 인근 오션뷰 펜션, 르메르후에서 즐기는 바다 휴식">
    <meta name="keywords" content="양양펜션,양양오션뷰펜션,양양바베큐펜션,강원도펜션,강원도오션뷰펜션,강원도바베큐펜션,강원펜션,강원오션뷰펜션,강원바베큐펜션">
    <link rel="preload" href="styles/common.css" as="style">
    <link rel="preload" href="styles/nearby-attractions.css" as="style">

    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/slider.css">
    <link rel="stylesheet" href="styles/nearby-attractions.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="양양 르메르후 펜션" />
  <meta property="og:description" content="양양 동호해변 인근 오션뷰 펜션, 르메르후에서 즐기는 바다 휴식" />
  <meta property="og:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/09/sJ0ukVndheTf.jpg" />
  <meta property="og:url" content="https://lemerhoo.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="양양 르메르후 펜션" />
  <meta name="twitter:description" content="양양 동호해변 인근 오션뷰 펜션, 르메르후에서 즐기는 바다 휴식" />
  <meta name="twitter:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/09/sJ0ukVndheTf.jpg" />
  <meta name="naver-site-verification" content="fa4e08acfdda791e462254a6cc292438810fb731" />
  <meta name="google-site-verification" content="z7JcGPbgv3uxmddcE1CWtvzULL0oxvhHrLY7O0snRxU" />
</head>
<body>

    <main class="main-content">
        <!-- CUSTOM FIELD : 메인 소개 섹션 -->
        <section class="hero-section hero-center-bottom">
            <div class="hero-slider" data-hero-slider>
                <!-- 주변 명소 이미지 동적 매핑 -->
            </div>
            <!-- 페이지명 하드코딩 -->
            <div class="hero-property-title">NEARBY ATTRACTIONS</div>
            <div class="hero-bottom-info">
                <div class="hero-progress-container">
                    <button class="hero-nav-prev" aria-label="Previous slide">&lt;</button>
                    <span class="current-slide hero-indicators" data-current-slide>01</span>
                    <div class="hero-progress-bar">
                        <div class="hero-progress-fill" data-hero-progress></div>
                    </div>
                    <span class="total-slides hero-indicators" data-total-slides>02</span>
                    <button class="hero-nav-next" aria-label="Next slide">&gt;</button>
                </div>
            </div>
        </section>

        <div class="main-about-section">
            <div class="main-about-content">
                <!-- homepage.customFields.pages.nearbyAttractions.sections[0].hero.title 매핑 -->
                <h2 class="main-about-title" data-nearby-attractions-hero-title></h2>
                <!-- homepage.customFields.pages.nearbyAttractions.sections[0].hero.description 매핑 -->
                <p class="main-about-description" data-nearby-attractions-hero-description></p>
            </div>

            <!-- CUSTOM FIELD : 소개 섹션 / 동적 블록 생성 영역 -->
            <!-- homepage.customFields.pages.nearbyAttractions.sections[0].about[] 매핑 -->
            <section class="intro-section">
                <!-- 동적으로 intro-block이 생성됩니다 -->
            </section>
        </div>

        <!-- property.images[0].exterior[] 첫번째 이미지 매핑 -->
        <section class="full-banner" data-main-banner>
            <!-- property.nameEn 매핑 -->
            <h2 class="full-banner-title" data-closing-property-name></h2>
        </section>

    </main>

    <!-- Include ImageWithFallback script (standard-template-data.json에서만 필요) -->
    <!-- <script src="js/image-with-fallback.js"></script> -->

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper (must load before preview-handler) -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Nearby Attractions Page Mapper -->
    <script src="js/data-mapper/pages/nearby-attractions-mapper.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Fullscreen Slider Component -->
    <script src="js/components/fullscreen-slider.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/nearby-attractions.js"></script>

    <!-- Scroll Animations -->
    <script src="js/scroll-animations.js"></script>

    <!-- Initialize Data Mapper -->
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Preview 모드가 아닐 때만 초기화 (preview-handler가 완전히 담당)
            const isPreview = window.parent !== window;
            if (!isPreview) {
                const nearbyAttractionsMapper = new NearbyAttractionsMapper();
                await nearbyAttractionsMapper.initialize();

                // Initialize hero slider after mapper finishes
                setTimeout(() => {
                    if (typeof window.initHeroSlider === 'function') {
                        window.initHeroSlider();
                    }
                }, 100);
            }
        });
    </script>

</body>
</html>
